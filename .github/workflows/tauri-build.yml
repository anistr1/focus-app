name: "Build Focus App"

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri App (EXE & MSI)
        run: npm run tauri:build

      - name: Import code-signing certificate
        if: ${{ secrets.WINDOWS_CERTIFICATE_PFX_B64 != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
        shell: powershell
        env:
          WINDOWS_CERTIFICATE_PFX_B64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_B64 }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_B64))
          echo "WINDOWS_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign Windows bundles (.exe and .msi)
        if: ${{ env.WINDOWS_PFX_PATH != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
        shell: powershell
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          $bundleDir = "src-tauri\target\release\bundle"
          $files = Get-ChildItem -Path $bundleDir -Recurse -File | Where-Object { $_.Extension -in @(".exe", ".msi") }
          if (-not $files) { throw "No .exe/.msi files found under $bundleDir" }

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\**\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found on runner" }

          $timestampUrl = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_TIMESTAMP_URL)) { "http://timestamp.digicert.com" } else { $env:WINDOWS_TIMESTAMP_URL }

          foreach ($file in $files) {
            & $signtool.FullName sign `
              /f "$env:WINDOWS_PFX_PATH" `
              /p "$env:WINDOWS_CERTIFICATE_PASSWORD" `
              /fd SHA256 `
              /tr "$timestampUrl" `
              /td SHA256 `
              "$($file.FullName)"

            if ($LASTEXITCODE -ne 0) {
              throw "Failed signing file: $($file.FullName)"
            }
          }

      - name: Verify signatures
        if: ${{ env.WINDOWS_PFX_PATH != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
        shell: powershell
        run: |
          $bundleDir = "src-tauri\target\release\bundle"
          $files = Get-ChildItem -Path $bundleDir -Recurse -File | Where-Object { $_.Extension -in @(".exe", ".msi") }
          foreach ($file in $files) {
            $sig = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($sig.Status -ne "Valid") {
              throw "Invalid signature for $($file.FullName): $($sig.Status)"
            }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: focus-app-windows-bundles
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
          generate_release_notes: true
